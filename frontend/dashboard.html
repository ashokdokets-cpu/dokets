<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokets VouchAI — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14; --card: #0f1419; --card-hover: #161c24;
            --border: #1c2330; --text: #e2e8f0; --muted: #64748b;
            --primary: #6366f1; --primary-hover: #5558e6; --primary-glow: rgba(99,102,241,0.2);
            --success: #22c55e; --success-bg: rgba(34,197,94,0.1);
            --warning: #f59e0b; --danger: #ef4444;
            --ai: #8b5cf6; --radius: 10px; --radius-sm: 6px;
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        body.light-mode {
            --bg: #f8fafc; --card: #ffffff; --card-hover: #f1f5f9;
            --border: #e2e8f0; --text: #1e293b; --muted: #64748b;
        }

        /* HEADER */
        .header {
            background: rgba(15,20,25,0.9); border-bottom: 1px solid var(--border);
            padding: 0 1.5rem; height: 52px; display:flex; align-items:center;
            position: sticky; top:0; z-index:100; backdrop-filter: blur(20px);
        }
        body.light-mode .header { background: rgba(255,255,255,0.9); }
        .header-inner {
            max-width: 1280px; margin:0 auto; width:100%;
            display:flex; justify-content:space-between; align-items:center;
        }
        .logo {
            font-size: 1.1rem; font-weight: 700; color: var(--text);
            text-decoration: none; display:flex; align-items:center; gap: 0.5rem;
            letter-spacing: -0.02em;
        }
        .logo-dot { width:8px; height:8px; border-radius:50%; background: var(--primary); }
        .mode-switcher { display:flex; background:var(--bg); border-radius:50px; padding:2px; border:1px solid var(--border); gap:1px; }
        .mode-btn {
            padding: 0.35rem 0.9rem; border-radius:50px; border:none; cursor:pointer;
            font-weight: 500; font-size:0.78rem; transition:var(--transition);
            background:transparent; color:var(--muted); font-family:inherit;
        }
        .mode-btn.active { background:var(--primary); color:#fff; }
        .mode-btn:hover:not(.active) { color:var(--text); }
        .user-info { display:flex; align-items:center; gap:0.6rem; }
        .user-avatar {
            width:30px; height:30px; border-radius:50%; background:var(--primary);
            display:flex; align-items:center; justify-content:center;
            font-weight:600; font-size:0.75rem; color:#fff;
        }
        .badge {
            font-size:0.6rem; padding:0.15rem 0.45rem; border-radius:50px;
            font-weight:600; text-transform:uppercase; letter-spacing:0.5px;
        }
        .badge-customer { background:rgba(59,130,246,0.15); color:#60a5fa; }
        .badge-provider { background:rgba(139,92,246,0.15); color:#a78bfa; }

        /* MAIN */
        .main { max-width:1280px; margin:0 auto; padding:1.5rem; }

        /* TABS */
        .tabs {
            display:flex; gap:0; margin-bottom:1.5rem;
            border-bottom:1px solid var(--border);
        }
        .tab {
            padding:0.5rem 1rem; border:none; cursor:pointer; font-weight:500;
            font-size:0.82rem; color:var(--muted); background:transparent;
            border-bottom:2px solid transparent; margin-bottom:-1px;
            font-family:inherit; transition:var(--transition);
        }
        .tab.active { color:var(--text); border-bottom-color:var(--primary); font-weight:600; }
        .tab:hover { color:var(--text); }
        .tab .badge-count {
            background:var(--primary); color:#fff; padding:0.1rem 0.4rem;
            border-radius:50px; font-size:0.65rem; margin-left:0.3rem;
        }

        /* STATS */
        .stats-row {
            display:grid; grid-template-columns:repeat(4,1fr); gap:1rem;
            margin-bottom:2rem;
        }
        .stat-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:var(--radius); padding:1.25rem 1.5rem;
            transition:var(--transition);
        }
        .stat-card:hover { border-color:var(--primary); }
        .stat-label { color:var(--muted); font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.35rem; }
        .stat-value { font-size:1.8rem; font-weight:700; letter-spacing:-0.02em; }

        /* GRID */
        .cards-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
            gap:0.75rem; margin-bottom:1.5rem;
        }
        .feature-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:var(--radius); padding:1.25rem; cursor:pointer;
            transition:var(--transition);
        }
        .feature-card:hover { border-color:rgba(99,102,241,0.4); transform:translateY(-1px); }
        .feature-card .card-label {
            font-size:0.55rem; font-weight:700; text-transform:uppercase;
            letter-spacing:0.5px; color:var(--primary); margin-bottom:0.5rem;
        }
        .feature-card .card-title { font-size:0.95rem; font-weight:600; margin-bottom:0.2rem; }
        .feature-card .card-desc { color:var(--muted); font-size:0.78rem; line-height:1.4; }

        /* SECTION HEADER */
        .section-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:0.75rem;
        }
        .section-header h2 { font-size:1rem; font-weight:700; }
        .section-header a { color:var(--primary); font-size:0.8rem; font-weight:500; text-decoration:none; cursor:pointer; }
        .section-header a:hover { text-decoration:underline; }

        /* CONTRACT LIST */
        .contract-list { display:flex; flex-direction:column; gap:0.4rem; }
        .contract-item {
            display:flex; justify-content:space-between; align-items:center;
            padding:0.75rem 1rem; background:var(--card);
            border-radius:var(--radius-sm); border:1px solid transparent;
            transition:var(--transition); cursor:pointer;
        }
        .contract-item:hover { border-color:var(--border); background:var(--card-hover); }
        .contract-left { display:flex; align-items:center; gap:0.75rem; }
        .contract-icon {
            width:34px; height:34px; border-radius:6px;
            display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:0.8rem;
        }
        .contract-info h4 { font-weight:600; font-size:0.85rem; }
        .contract-info span { font-size:0.7rem; color:var(--muted); }
        .contract-right { text-align:right; }
        .contract-amount { font-weight:700; font-size:0.85rem; }
        .status-badge {
            display:inline-block; padding:0.12rem 0.45rem; border-radius:50px;
            font-size:0.6rem; font-weight:600; text-transform:uppercase;
        }
        .status-draft { background:rgba(100,116,139,0.1); color:#94a3b8; }
        .status-active { background:var(--success-bg); color:#22c55e; }
        .status-completed { background:rgba(59,130,246,0.1); color:#60a5fa; }

        .empty-state {
            text-align:center; padding:3rem 1rem; color:var(--muted);
            background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
        }
        .empty-state h3 { font-size:1rem; margin-bottom:0.3rem; color:var(--text); }
        .empty-state p { font-size:0.8rem; margin-bottom:1rem; }

        /* MODAL */
        .modal-overlay {
            display:none; position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.7); z-index:1000;
            align-items:center; justify-content:center; backdrop-filter:blur(4px);
        }
        .modal-overlay.show { display:flex; }
        .modal {
            background:var(--card); border:1px solid var(--border);
            border-radius:var(--radius); padding:1.5rem; width:95%; max-width:520px;
            max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .modal h3 { font-size:1rem; margin-bottom:1rem; font-weight:700; }
        .form-group { margin-bottom:0.75rem; }
        .form-group label { display:block; margin-bottom:0.2rem; font-weight:600; font-size:0.75rem; color:var(--muted); }
        .form-group input, .form-group textarea, .form-group select {
            width:100%; padding:0.5rem 0.7rem; background:var(--bg);
            border:1px solid var(--border); border-radius:var(--radius-sm);
            color:var(--text); font-size:0.82rem; font-family:inherit; transition:var(--transition);
        }
        .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--primary); }
        .btn {
            padding:0.5rem 1.25rem; border-radius:var(--radius-sm); border:none;
            font-weight:600; cursor:pointer; font-size:0.82rem; transition:var(--transition);
            font-family:inherit; letter-spacing:-0.01em;
        }
        .btn-primary { background:var(--primary); color:#fff; width:100%; }
        .btn-primary:hover { background:var(--primary-hover); }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
        .btn-outline:hover { background:rgba(255,255,255,0.03); }
        .btn-sm { padding:0.3rem 0.7rem; font-size:0.75rem; }
        .btn-xs { padding:0.2rem 0.5rem; font-size:0.68rem; }
        .btn-success { background:var(--success); color:#fff; }

        /* TOAST */
        .toast {
            position:fixed; top:1rem; right:1rem; background:var(--card);
            color:var(--text); padding:0.65rem 1.25rem; border-radius:var(--radius-sm);
            font-weight:600; font-size:0.8rem; z-index:2000;
            box-shadow:0 8px 24px rgba(0,0,0,0.5); border:1px solid var(--border);
        }
        .toast.error { border-left:3px solid var(--danger); }
        .toast.success { border-left:3px solid var(--success); }

        /* FOOTER */
        .dash-footer {
            text-align:center; padding:1.25rem; color:var(--muted);
            font-size:0.7rem; border-top:1px solid var(--border); margin-top:2rem;
        }
        .dash-footer a { color:var(--muted); text-decoration:none; }
        .dash-footer a:hover { color:var(--text); }

        /* SKELETON */
        @keyframes shimmer { 0%{background-position:-200px 0} 100%{background-position:200px 0} }
        .skeleton {
            background:linear-gradient(90deg,var(--border) 25%,var(--card-hover) 50%,var(--border) 75%);
            background-size:400px 100%; animation:shimmer 1.5s infinite; border-radius:4px;
        }

        @media (max-width:768px) {
            .stats-row { grid-template-columns:repeat(2,1fr); }
            .cards-grid { grid-template-columns:1fr; }
            .tabs { overflow-x:auto; }
        }
        @media (max-width:480px) {
            .stats-row { grid-template-columns:1fr; }
        }
    </style>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo"><span class="logo-dot"></span> Dokets</a>
        <div class="mode-switcher">
            <button class="mode-btn active" data-mode="customer" onclick="switchMode('customer')">Hire</button>
            <button class="mode-btn" data-mode="provider" onclick="switchMode('provider')">Earn</button>
        </div>
        <div class="user-info">
            <div style="text-align:right;line-height:1.2">
                <div style="font-weight:600;font-size:0.75rem" id="userName">User</div>
                <div style="font-size:0.6rem;color:var(--muted)" id="userEmail">email</div>
            </div>
            <div class="user-avatar" id="userAvatar">U</div>
            <span class="badge badge-customer" id="modeBadge">CUSTOMER</span>
            <select id="langSwitcher" onchange="switchLanguage(this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.2rem 0.3rem;border-radius:4px;font-size:0.65rem">
    <option value="en">EN</option><option value="hi">HI</option><option value="es">ES</option><option value="pt">PT</option><option value="fr">FR</option><option value="ar">AR</option><option value="id">ID</option><option value="bn">BN</option><option value="zh">ZH</option><option value="de">DE</option><option value="ja">JA</option><option value="ko">KO</option>
</select>
            <button class="btn btn-outline btn-xs" onclick="logout()" style="font-size:0.7rem">Log out</button>
        </div>
    </div>
</header>

<main class="main" id="mainContent"></main>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<script>
const BASE = 'https://dokets.com';
let token = localStorage.getItem('dokets_token');
let currentMode = 'customer';
let userData = null;
let activeTab = window.location.hash.replace('#','') || 'home';
window.addEventListener('hashchange',function(){const t=window.location.hash.replace('#','')||'home';if(t!==activeTab){activeTab=t;navigateToTab(t);}});

async function init(){
    if(!token){showLoginModal();return;}
    try{
        const r=await fetch(`${BASE}/api/v1/users/me`,{headers:{'Authorization':'Bearer '+token}});
        if(!r.ok){localStorage.removeItem('dokets_token');showLoginModal();return;}
        userData=await r.json();currentMode=userData.current_mode||'customer';
        updateUI();navigateToTab(activeTab);
    }catch(e){showLoginModal();}
}

function showLoginModal(){
    document.getElementById('mainContent').innerHTML=`
        <div style="max-width:400px;margin:6rem auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center">
            <a href="/" style="color:var(--muted);text-decoration:none;font-size:0.8rem;display:block;margin-bottom:1.25rem;text-align:left">&larr; Back to Home</a>
            <div style="font-size:2rem;margin-bottom:0.5rem;font-weight:700">Dokets</div>
            <p style="color:var(--muted);margin-bottom:1.25rem;font-size:0.85rem">Trust in Every Deal</p>
            <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
            <a href="#" onclick="showForgotPassword()" style="color:var(--muted);font-size:0.75rem;text-decoration:none;display:block;text-align:right;margin-top:-0.5rem;margin-bottom:0.5rem">Forgot password?</a>
            <div class="form-group"><select id="loginMode"><option value="customer">I need a service</option><option value="provider">I provide a service</option></select></div>
            <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
            <button class="btn btn-outline" style="margin-top:0.4rem;width:100%" onclick="doRegister()">Create Account</button>
        </div>`;
}
async function doLogin(){
    const e=document.getElementById('loginEmail').value,p=document.getElementById('loginPassword').value,m=document.getElementById('loginMode').value;
    const r=await fetch(`${BASE}/api/v1/users/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p,mode:m})});
    const d=await r.json();
    if(d.access_token){localStorage.setItem('dokets_token',d.access_token);token=d.access_token;currentMode=m;userData=d.user;updateUI();navigateToTab('home');}
    else showToast(d.detail||'Login failed','error');
}
async function doRegister(){
    const e=document.getElementById('loginEmail').value,p=document.getElementById('loginPassword').value;
    if(!e||!p){showToast('Fill all fields','error');return;}
    const r=await fetch(`${BASE}/api/v1/users/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p,phone_number:'+919100014859',full_name:e.split('@')[0]})});
    const d=await r.json();if(d.success){showToast('Registered!');doLogin();}else showToast(d.detail||'Failed','error');
}
function updateUI(){
    if(!userData)return;
    document.getElementById('userName').textContent=userData.full_name||'User';
    document.getElementById('userEmail').textContent=userData.email||'';
    document.getElementById('userAvatar').textContent=(userData.full_name||'U')[0].toUpperCase();
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===currentMode));
    const b=document.getElementById('modeBadge');b.textContent=currentMode==='customer'?'CUSTOMER':'PROVIDER';b.className=`badge badge-${currentMode}`;
}
async function switchMode(mode){
    if(mode===currentMode)return;
    const r=await fetch(`${BASE}/api/v1/users/switch-mode`,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({mode})});
    const d=await r.json();
    if(d.success){token=d.access_token;localStorage.setItem('dokets_token',token);currentMode=mode;updateUI();navigateToTab('home');}
}
function logout(){localStorage.removeItem('dokets_token');token=null;userData=null;showLoginModal();}

function navigateToTab(tab){
    activeTab=tab;window.location.hash=tab;
    if(tab==='home')renderHome();
    else if(tab==='contracts')renderContractsTab();
    else if(tab==='marketplace')renderMarketplace();
    else if(tab==='jobs')renderJobsTab();
    else if(tab==='ai')renderAITab();
    else if(tab==='advanced')renderAdvancedTab();
    else if(tab==='templates')renderTemplatesTab();
    else if(tab==='providers')renderProvidersTab();
}

// ==================== HOME ====================
function renderHome(){
    const stats=currentMode==='customer'?[
        {label:'Contracts',value:userData.total_contracts||0},{label:'Completed',value:userData.completed_as_customer||0},{label:'Spent',value:getCurrencySymbol(userData?.currency||'INR')+(userData.total_spent||0)},{label:'Vouch Score',value:userData.vouch_score||100}
    ]:[
        {label:'Jobs',value:userData.total_contracts||0},{label:'Completed',value:userData.completed_as_provider||0},{label:'Earned',value:getCurrencySymbol(userData?.currency||'INR')+(userData.total_earned||0)},{label:'Vouch Score',value:userData.vouch_score||100}
    ];
    document.getElementById('mainContent').innerHTML=`
        <div class="tabs">
            <button class="tab ${activeTab==='home'?'active':''}" onclick="navigateToTab('home')">Home</button>
            <button class="tab ${activeTab==='contracts'?'active':''}" onclick="navigateToTab('contracts')">Contracts <span class="badge-count" id="contractCount">-</span></button>
            <button class="tab ${activeTab==='marketplace'?'active':''}" onclick="navigateToTab('marketplace')">Marketplace</button>
            <button class="tab ${activeTab==='jobs'?'active':''}" onclick="navigateToTab('jobs')">Jobs</button>
            <span style="margin-left:auto;display:flex;gap:0">
                <button class="tab" onclick="navigateToTab('ai')">AI</button>
                <button class="tab" onclick="navigateToTab('advanced')">Tools</button>
            </span>
        </div>
        <div class="stats-row">${stats.map(s=>`<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div></div>`).join('')}</div>
        <div class="section-header"><h2>Quick Actions</h2></div>
        <div class="cards-grid">
            ${currentMode==='customer'?`
            <div class="feature-card" onclick="openCreateContract()"><div class="card-label">Contract</div><div class="card-title">Create Contract</div><div class="card-desc">Set milestones, secure with escrow</div></div>
            <div class="feature-card" onclick="openAIContract()"><div class="card-label" style="color:var(--ai)">AI Powered</div><div class="card-title">Smart Contract</div><div class="card-desc">Describe work, AI builds it</div></div>
            `:`
            <div class="feature-card" onclick="navigateToTab('contracts')"><div class="card-label">Jobs</div><div class="card-title">Available Work</div><div class="card-desc">Accept contracts waiting for you</div></div>
            <div class="feature-card" onclick="openProviderProfile()"><div class="card-label">Profile</div><div class="card-title">Service Profile</div><div class="card-desc">Add skills, rates, portfolio</div></div>
            <div class="feature-card" onclick="viewMyProfile()"><div class="card-label">View</div><div class="card-title">My Public Profile</div><div class="card-desc">See how customers view you</div></div>
            <div class="feature-card" onclick="viewPayoutHistory()"><div class="card-label">History</div><div class="card-title">Payout History</div><div class="card-desc">Track your withdrawals</div></div>
            <div class="feature-card" onclick="openPayoutRequest()"><div class="card-label">Earn</div><div class="card-title">Request Payout</div><div class="card-desc">Withdraw via UPI or Bank</div></div>
            `}
            <div class="feature-card" onclick="openAIVerify()"><div class="card-label" style="color:var(--ai)">AI</div><div class="card-title">Work Verification</div><div class="card-desc">AI analyzes proof of work</div></div>
            <div class="feature-card" onclick="openVideoCall()"><div class="card-label">Live</div><div class="card-title">Video Call</div><div class="card-desc">Secure meeting with party</div></div>
            <div class="feature-card" onclick="openDisputeMediation()"><div class="card-label" style="color:var(--ai)">AI</div><div class="card-title">Dispute Resolution</div><div class="card-desc">AI mediates conflicts</div></div>
            <div class="feature-card" onclick="openRecurringContract()"><div class="card-label">Auto</div><div class="card-title">Recurring Contract</div><div class="card-desc">Auto-renew monthly/weekly</div></div>
        </div>
        <footer class="dash-footer"><p>&copy; 2026 <strong>Dokets VouchAI</strong> &middot; Trust in Every Deal</p><p style="margin-top:0.3rem"><a href="/about">About</a> &middot; <a href="/privacy">Privacy</a> &middot; <a href="/terms">Terms</a> &middot; <a href="/contact">Contact</a></p></footer>`;
    loadContractCount();
}
async function loadContractCount(){try{const r=await fetch(`${BASE}/api/v1/contracts/`,{headers:{'Authorization':'Bearer '+token}});const d=await r.json();const el=document.getElementById('contractCount');if(el)el.textContent=d.total||0;}catch(e){}}

// ==================== CONTRACTS ====================
async function renderContractsTab(){document.getElementById('mainContent').innerHTML=`<div class="tabs"><button class="tab" onclick="navigateToTab('home')">Home</button><button class="tab active" onclick="navigateToTab('contracts')">Contracts <span class="badge-count" id="contractCount">-</span></button><button class="tab" onclick="navigateToTab('marketplace')">Marketplace</button><button class="tab" onclick="navigateToTab('jobs')">Jobs</button></div><div class="section-header"><h2>${currentMode==='customer'?'My Contracts':'My Jobs'}</h2><button class="btn btn-outline btn-sm" style="width:auto" onclick="toggleCalendarView()">Calendar View</button></div><div id="contractsView"><div class="contract-list" id="contractList">${showSkeleton(3)}</div></div>`;await loadContracts();loadContractCount();}
async function loadContracts(){
    const c=document.getElementById('contractList');if(!c)return;
    try{const r=await fetch(`${BASE}/api/v1/contracts/`,{headers:{'Authorization':'Bearer '+token}});const d=await r.json();const contracts=d.contracts||[];
    if(contracts.length===0){c.innerHTML=`<div class="empty-state"><h3>No contracts yet</h3><p>Create your first contract to get started.</p><button class="btn btn-primary btn-sm" style="width:auto" onclick="openCreateContract()">Create Contract</button></div>`;return;}
    c.innerHTML=contracts.map(ct=>{const isPending=currentMode==='provider'&&ct.status==='draft';return`<div class="contract-item" onclick="viewContract('${ct.id}')"><div class="contract-left"><div class="contract-icon" style="background:${ct.status==='completed'?'rgba(34,197,94,0.1)':ct.status==='active'?'rgba(59,130,246,0.1)':'rgba(245,158,11,0.1)'};color:${ct.status==='completed'?'#22c55e':ct.status==='active'?'#60a5fa':'#f59e0b'}">${ct.status==='completed'?'C':ct.status==='active'?'A':'D'}</div><div class="contract-info"><h4>${ct.title||'Untitled'}</h4><span>${ct.id} &middot; ${ct.milestones?.length||0} milestones</span></div></div><div class="contract-right"><div class="contract-amount">${getCurrencySymbol(ct.currency)} ${ct.total_amount||0}</div><span class="status-badge status-${ct.status||'draft'}">${ct.status||'draft'}</span>${isPending?`<div style="margin-top:0.3rem"><button class="btn btn-success btn-xs" onclick="event.stopPropagation();acceptContract('${ct.id}')">Accept</button><button class="btn btn-outline btn-xs" onclick="event.stopPropagation();rejectContract('${ct.id}')">Decline</button></div>`:''}
${currentMode==='customer'&&ct.status==='active'?`<div style="margin-top:0.3rem">${(ct.milestones||[]).map(ms=>ms.status!=='completed'?`<button class="btn btn-primary btn-xs" style="margin:0.15rem" onclick="event.stopPropagation();completeMilestone('${ct.id}','${ms.id}')">Pay ${ms.title} (${ct.currency||'INR'} ${ms.amount})</button>`:'').join('')}</div>`:''}
${ct.status==='completed'&&!ct.reviewed?`<div style="margin-top:0.3rem"><button class="btn btn-outline btn-xs" onclick="event.stopPropagation();openReview('${ct.id}')">Leave Review</button></div>`:''}</div></div>`;}).join('');}catch(e){c.innerHTML='<div class="empty-state"><p>Error loading contracts</p></div>';}
}
async function toggleCalendarView(){
    const c=document.getElementById('contractsView');
    const r=await fetch(`${BASE}/api/v1/contracts/`,{headers:{'Authorization':'Bearer '+token}});const d=await r.json();const contracts=d.contracts||[];
    const milestones=[];contracts.forEach(ct=>{(ct.milestones||[]).forEach(ms=>{if(ms.deadline)milestones.push({contract:ct.title,milestone:ms.title,deadline:ms.deadline,status:ms.status,amount:ms.amount,currency:ct.currency});});});
    milestones.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
    c.innerHTML=milestones.length===0?`<div class="empty-state"><h3>No milestones</h3><p>No upcoming deadlines found.</p></div>`:`<div style="display:flex;flex-direction:column;gap:0.4rem">${milestones.map(m=>`<div class="contract-item"><div><strong>${m.milestone}</strong><br><span style="font-size:0.7rem;color:var(--muted)">${m.contract}</span></div><div style="text-align:right"><div>${m.currency} ${m.amount}</div><span style="font-size:0.7rem;color:var(--muted)">${new Date(m.deadline).toLocaleDateString()}</span><span class="status-badge status-${m.status||'draft'}">${m.status||'pending'}</span></div></div>`).join('')}</div>`;
}

async function completeMilestone(cid,mid) {
    const r = await fetch(`${BASE}/api/v1/contracts/${cid}/complete-milestone/${mid}`, {
        method:'PUT',
        headers:{'Authorization':'Bearer '+token}
    });
    const d = await r.json();
    if(d.success) {
        showToast('Milestone completed! Payment released.');
        loadContracts();
    } else {
        showToast(d.detail||'Failed','error');
    }
}

// ==================== CONTRACT ACTIONS ====================
async function acceptContract(cid){const r=await fetch(`${BASE}/api/v1/contracts/${cid}/accept`,{method:'PUT',headers:{'Authorization':'Bearer '+token}});const d=await r.json();if(d.success){showToast('Accepted!');loadContracts();}else showToast(d.detail||'Failed','error');}
async function rejectContract(cid){const r=await fetch(`${BASE}/api/v1/contracts/${cid}/reject`,{method:'PUT',headers:{'Authorization':'Bearer '+token}});const d=await r.json();if(d.success){showToast('Declined');loadContracts();}}
function viewContract(cid){window.open(`/contract-view/${cid}`,'_blank');}
function openReview(cid){document.getElementById('modalContent').innerHTML=`<h3>Leave a Review</h3><p style="color:var(--muted);margin-bottom:0.75rem;font-size:0.8rem">How was your experience?</p><div style="text-align:center;font-size:1.8rem;margin-bottom:0.75rem" id="starRating">${[1,2,3,4,5].map(i=>`<span onclick="setRating(${i})" id="star${i}" style="cursor:pointer;opacity:0.3;transition:var(--transition)">&#9733;</span>`).join('')}</div><div class="form-group"><label>Your Review</label><textarea id="reviewText" rows="3" placeholder="Share your experience..."></textarea></div><button class="btn btn-primary" onclick="submitReview('${cid}')">Submit Review</button><button class="btn btn-outline" style="margin-top:0.4rem;width:100%" onclick="closeModal()">Cancel</button>`;document.getElementById('modalOverlay').classList.add('show');window._reviewRating=5;}
function setRating(r){window._reviewRating=r;for(let i=1;i<=5;i++)document.getElementById('star'+i).style.opacity=i<=r?'1':'0.3';}
async function submitReview(cid){const r=await fetch(`${BASE}/api/v1/reviews/submit`,{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({contract_id:cid,rating:window._reviewRating,review:document.getElementById('reviewText').value})});const d=await r.json();if(d.success){closeModal();showToast('Review submitted!');}}

// ==================== TOAST ====================
function showToast(msg,type='success'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
function switchLanguage(lang){
    localStorage.setItem('dokets_lang', lang);
    updateUILanguage(lang);
    showToast('Language changed to ' + lang.toUpperCase());
}

async function updateUILanguage(lang){
    try {
        const r = await fetch(BASE+'/api/v1/translations/'+lang);
        window._translations = await r.json();
        if (activeTab === 'home') renderHome();
        else if (activeTab === 'contracts') renderContractsTab();
        else if (activeTab === 'marketplace') renderMarketplace();
        else if (activeTab === 'jobs') renderJobsTab();
        else if (activeTab === 'ai') renderAITab();
        else if (activeTab === 'advanced') renderAdvancedTab();
    } catch(e) {}
}

function t(key) {
    return (window._translations && window._translations[key]) || key;
}

function showForgotPassword(){
    document.getElementById('mainContent').innerHTML=`
        <div style="max-width:400px;margin:6rem auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center">
            <a href="#" onclick="showLoginModal()" style="color:var(--muted);text-decoration:none;font-size:0.8rem;display:block;margin-bottom:1.25rem;text-align:left">&larr; Back to Login</a>
            <h3 style="margin-bottom:1rem">Reset Password</h3>
            <p style="color:var(--muted);font-size:0.8rem;margin-bottom:1rem">Enter your email OR phone number</p>
            <div class="form-group"><input type="text" id="resetIdentifier" placeholder="Email or Phone (+919100014859)"></div>
            <div class="form-group">
                <select id="resetMethod">
                    <option value="whatsapp">Send via WhatsApp</option>
                    <option value="email">Send via Email</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="sendResetCode()">Send Reset Code</button>
            <p style="color:var(--muted);font-size:0.7rem;margin-top:0.5rem">If WhatsApp fails, code will be sent via Email automatically</p>
            <div id="resetResult" style="margin-top:1rem"></div>
        </div>`;
}

async function sendResetCode(){
    const identifier = document.getElementById('resetIdentifier').value.trim();
    const method = document.getElementById('resetMethod').value;
    
    // Detect if it's email or phone
    const isEmail = identifier.includes('@');
    const body = isEmail ? {email: identifier, method} : {phone: identifier, method};
    
    const r = await fetch(BASE+'/api/v1/users/forgot-password', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
    });
    const d = await r.json();
    document.getElementById('resetResult').innerHTML = `
        <p style="color:#22c55e;margin-bottom:1rem">Reset code sent via ${d.sent_via || 'message'}!</p>
        <div class="form-group"><input type="text" id="resetCode" placeholder="Enter 6-digit code"></div>
        <div class="form-group"><input type="password" id="newPassword" placeholder="New password (8+ chars)"></div>
        <button class="btn btn-primary" onclick="doResetPassword()">Reset Password</button>
    `;
    // Store the identifier for reset
    window._resetIdentifier = identifier;
}

async function doResetPassword(){
    const identifier = window._resetIdentifier || document.getElementById('resetIdentifier')?.value || '';
    const isEmail = identifier.includes('@');
    const email = isEmail ? identifier : '';
    const code = document.getElementById('resetCode').value;
    const pass = document.getElementById('newPassword').value;
    const r = await fetch(BASE+'/api/v1/users/reset-password', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email, code, new_password:pass})
    });
    const d = await r.json();
    if(d.success){showToast('Password reset! Please login.');showLoginModal();}
    else showToast(d.detail||'Failed','error');
}

async function viewMyProfile(){
    const r = await fetch(BASE+'/api/v1/providers/my-profile', {headers:{'Authorization':'Bearer '+token}});
    const d = await r.json();
    if(d.success && d.profile){
        const p = d.profile;
        document.getElementById('modalContent').innerHTML = `
            <h3>My Public Profile</h3>
            <div style="background:var(--bg);padding:1rem;border-radius:var(--radius-sm);margin-bottom:0.5rem">
                <p><strong>Skills:</strong> ${(p.skills||[]).join(', ') || 'Not set'}</p>
                <p><strong>Categories:</strong> ${(p.categories||[]).join(', ') || 'Not set'}</p>
                <p><strong>Experience:</strong> ${p.experience_years||0} years</p>
                <p><strong>Rate:</strong> ${p.hourly_rate||'Not set'} /hr</p>
                <p><strong>Bio:</strong> ${p.bio||'Not set'}</p>
                <p><strong>Cities:</strong> ${(p.service_cities||[]).join(', ') || 'Not set'}</p>
                ${p.packages ? `<p><strong>Packages:</strong> Basic: ${p.packages.basic?.price||'-'}, Standard: ${p.packages.standard?.price||'-'}, Premium: ${p.packages.premium?.price||'-'}</p>` : ''}
            </div>
            <button class="btn btn-outline" style="width:100%" onclick="closeModal()">Close</button>
        `;
        document.getElementById('modalOverlay').classList.add('show');
    } else {
        showToast('Profile not found. Create one first!');
    }
}

async function viewPayoutHistory(){
    const r = await fetch(BASE+'/api/v1/payouts', {headers:{'Authorization':'Bearer '+token}});
    const d = await r.json();
    const payouts = d.payouts || [];
    const stats = d.stats || {};
    
    let html = `<h3>Payout History</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;margin-bottom:1rem;text-align:center">
            <div style="background:var(--bg);padding:0.5rem;border-radius:var(--radius-sm)"><strong>${stats.total_requested||0}</strong><br><span style="font-size:0.7rem;color:var(--muted)">Requested</span></div>
            <div style="background:var(--bg);padding:0.5rem;border-radius:var(--radius-sm)"><strong>${stats.total_paid||0}</strong><br><span style="font-size:0.7rem;color:var(--muted)">Paid</span></div>
            <div style="background:var(--bg);padding:0.5rem;border-radius:var(--radius-sm)"><strong>${stats.pending||0}</strong><br><span style="font-size:0.7rem;color:var(--muted)">Pending</span></div>
        </div>`;
    
    if(payouts.length === 0) {
        html += '<p style="text-align:center;color:var(--muted)">No payouts yet</p>';
    } else {
        html += '<div style="display:flex;flex-direction:column;gap:0.4rem;max-height:300px;overflow-y:auto">';
        payouts.forEach(p => {
            const statusColor = p.status==='completed'?'#22c55e':p.status==='approved'?'#60a5fa':'#f59e0b';
            html += `<div style="background:var(--bg);padding:0.75rem;border-radius:var(--radius-sm);border-left:3px solid ${statusColor}">
                <div style="display:flex;justify-content:space-between"><strong>${p.id}</strong><span style="color:${statusColor};font-size:0.75rem">${p.status.toUpperCase()}</span></div>
                <div style="font-size:0.8rem;color:var(--muted)">${p.currency} ${p.net_amount||p.amount} via ${p.method} | Fee: ${p.fee||0}</div>
                <div style="font-size:0.65rem;color:var(--muted)">${new Date(p.requested_at).toLocaleDateString()}</div>
            </div>`;
        });
        html += '</div>';
    }
    
    html += '<button class="btn btn-outline" style="margin-top:0.75rem;width:100%" onclick="closeModal()">Close</button>';
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('show');
}

function getCurrencySymbol(currency) {
    const symbols = {
        'INR':'₹','USD':'$','EUR':'€','GBP':'£','BRL':'R$','IDR':'Rp',
        'NGN':'₦','PHP':'₱','MXN':'MX$','AED':'د.إ','SAR':'﷼','BDT':'৳','PKR':'Rs'
    };
    return symbols[currency] || currency || '₹';
}
