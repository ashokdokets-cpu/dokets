<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokets VouchAI - Dashboard</title>
    <style>
        :root {
            --bg: #0a0e17;
            --card: #111827;
            --card-hover: #1a2332;
            --border: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --primary: #6366f1;
            --primary-glow: rgba(99,102,241,0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --ai: #8b5cf6;
            --ai-glow: rgba(139,92,246,0.3);
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.05) 0%, transparent 50%);
        }

        /* HEADER */
        .header {
            background: rgba(17,24,39,0.9);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }
        .logo-icon { font-size: 1.6rem; }

        /* MODE SWITCHER */
        .mode-switcher {
            display: flex;
            background: var(--bg);
            border-radius: 50px;
            padding: 3px;
            border: 1px solid var(--border);
            gap: 3px;
        }
        .mode-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
            background: transparent;
            color: var(--muted);
            white-space: nowrap;
        }
        .mode-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 15px var(--primary-glow);
        }
        .mode-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .user-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--ai));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem;
        }
        .mode-badge {
            font-size: 0.65rem; padding: 0.2rem 0.6rem;
            border-radius: 50px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-customer { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .badge-provider { background: rgba(139,92,246,0.2); color: #a78bfa; }

        /* MAIN */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        .tab {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
            color: var(--muted);
            background: transparent;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--card);
            border-color: var(--border);
            color: var(--text);
        }
        .tab:hover { color: var(--text); background: var(--card); }
        .tab .badge-count {
            background: var(--primary);
            color: #fff;
            padding: 0.1rem 0.5rem;
            border-radius: 50px;
            font-size: 0.7rem;
            margin-left: 0.3rem;
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            transition: all 0.3s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .stat-icon { font-size: 1.3rem; margin-bottom: 0.4rem; }
        .stat-value { font-size: 1.8rem; font-weight: 800; }
        .stat-label { color: var(--muted); font-size: 0.8rem; }

        /* GRID */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .feature-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .feature-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .feature-card.ai-card:hover { border-color: var(--ai); box-shadow: 0 8px 30px var(--ai-glow); }
        .feature-card .card-badge {
            position: absolute; top: 0.75rem; right: 0.75rem;
            font-size: 0.6rem; padding: 0.2rem 0.6rem;
            border-radius: 50px; font-weight: 700; text-transform: uppercase;
        }
        .badge-ai { background: rgba(139,92,246,0.2); color: #a78bfa; }
        .badge-new { background: rgba(16,185,129,0.2); color: #34d399; }
        .badge-premium { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .feature-card .card-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .feature-card .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .feature-card .card-desc { color: var(--muted); font-size: 0.85rem; line-height: 1.5; }

        /* CONTRACT LIST */
        .contract-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .contract-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.25rem; background: var(--card);
            border-radius: var(--radius-sm); border: 1px solid transparent;
            transition: all 0.3s; cursor: pointer;
        }
        .contract-item:hover { border-color: var(--border); background: var(--card-hover); }
        .contract-left { display: flex; align-items: center; gap: 0.75rem; }
        .contract-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .contract-info h4 { font-weight: 600; font-size: 0.95rem; }
        .contract-info span { font-size: 0.75rem; color: var(--muted); }
        .contract-right { text-align: right; }
        .contract-amount { font-weight: 700; font-size: 1rem; }
        .status-badge {
            display: inline-block; padding: 0.2rem 0.6rem;
            border-radius: 50px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
        }
        .status-draft { background: rgba(148,163,184,0.15); color: #94a3b8; }
        .status-active { background: rgba(16,185,129,0.15); color: #34d399; }
        .status-completed { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .status-disputed { background: rgba(239,68,68,0.15); color: #f87171; }

        .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 2rem;
            width: 95%; max-width: 600px; max-height: 85vh;
            overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .modal h3 { font-size: 1.2rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.85rem; color: var(--muted); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 0.7rem 1rem; background: var(--bg);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text); font-size: 0.9rem; font-family: inherit; transition: all 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
        .btn {
            padding: 0.7rem 1.5rem; border-radius: var(--radius-sm); border: none;
            font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; width: 100%; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-ai { background: linear-gradient(135deg, #8b5cf6, #a78bfa); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: rgba(255,255,255,0.03); }
        .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }
        .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

        /* TOAST */
        .toast {
            position: fixed; top: 1rem; right: 1rem;
            background: var(--success); color: #fff;
            padding: 0.8rem 1.25rem; border-radius: var(--radius-sm);
            font-weight: 600; z-index: 2000; animation: slideIn 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.4s ease forwards; }

        /* CHATBOT */
        .chatbot-widget {
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 500;
        }
        .chatbot-btn {
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border: none; cursor: pointer; font-size: 1.5rem;
            box-shadow: 0 4px 20px var(--ai-glow); transition: all 0.3s;
        }
        .chatbot-btn:hover { transform: scale(1.1); }
        .chatbot-panel {
            display: none; position: absolute; bottom: 70px; right: 0;
            width: 340px; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1rem; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .chatbot-panel.open { display: block; }
        .chat-messages { max-height: 300px; overflow-y: auto; margin-bottom: 0.75rem; font-size: 0.85rem; }
        .chat-msg { padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); margin-bottom: 0.4rem; }
        .chat-msg.bot { background: rgba(139,92,246,0.1); color: #c4b5fd; }
        .chat-msg.user { background: rgba(99,102,241,0.1); color: #a5b4fc; text-align: right; }
        .chat-input { display: flex; gap: 0.5rem; }
        .chat-input input { flex: 1; }

        @media (max-width: 768px) {
            .header-inner { flex-direction: column; }
            .cards-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .tabs { overflow-x: auto; flex-wrap: nowrap; }
        }
        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr; }
            .mode-switcher { width: 100%; }
            .mode-btn { flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo"><span class="logo-icon">🛡️</span> Dokets VouchAI</div>
        <div class="mode-switcher" id="modeSwitcher">
            <button class="mode-btn active" data-mode="customer" onclick="switchMode('customer')">🏠 Hire Services</button>
            <button class="mode-btn" data-mode="provider" onclick="switchMode('provider')">🔧 Offer Services</button>
        </div>
        <div class="user-info">
            <div style="text-align:right">
                <div style="font-weight:600;font-size:0.9rem" id="userName">User</div>
                <div style="font-size:0.7rem;color:var(--muted)" id="userEmail">email</div>
            </div>
            <div class="user-avatar" id="userAvatar">U</div>
            <span class="mode-badge badge-customer" id="modeBadge">CUSTOMER</span>
            <button class="btn btn-outline btn-sm" onclick="logout()" title="Logout">🚪</button>
        </div>
    </div>
</header>

<main class="main" id="mainContent"></main>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<!-- AI Chatbot Widget -->
<div class="chatbot-widget">
    <div class="chatbot-panel" id="chatbotPanel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
            <strong>🤖 Dokets AI Assistant</strong>
            <button class="btn btn-sm btn-outline" onclick="toggleChatbot()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-msg bot">Hi! I can help you create contracts, verify work, or answer questions. Try: "Create a contract for house painting ₹5000"</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter')sendChat()">
            <button class="btn btn-ai btn-sm" onclick="sendChat()">Send</button>
        </div>
    </div>
    <button class="chatbot-btn" onclick="toggleChatbot()">🤖</button>
</div>

<script>
const BASE = 'https://dokets.com';
let token = localStorage.getItem('dokets_token');
let currentMode = 'customer';
let userData = null;
let activeTab = 'dashboard';

async function init() {
    if (!token) { showLoginModal(); return; }
    try {
        const res = await fetch(`${BASE}/api/v1/users/me`, {headers: {'Authorization': 'Bearer ' + token}});
        if (!res.ok) { localStorage.removeItem('dokets_token'); showLoginModal(); return; }
        userData = await res.json();
        currentMode = userData.current_mode || 'customer';
        updateUI();
        renderDashboard();
    } catch (e) { console.error(e); showLoginModal(); }
}

function showLoginModal() {
    document.getElementById('mainContent').innerHTML = `
        <div style="max-width:450px;margin:4rem auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;text-align:center">
            <div style="font-size:4rem;margin-bottom:1rem">🛡️</div>
            <h2 style="margin-bottom:0.5rem">Welcome to Dokets VouchAI</h2>
            <p style="color:var(--muted);margin-bottom:1.5rem">Login or Register to continue</p>
            <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
            <div class="form-group">
                <select id="loginMode"><option value="customer">🏠 I need a service</option><option value="provider">🔧 I provide a service</option></select>
            </div>
            <button class="btn btn-primary" onclick="doLogin()">Login</button>
            <button class="btn btn-outline" style="margin-top:0.5rem;width:100%" onclick="doRegister()">Create Account</button>
        </div>`;
}

async function doLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const mode = document.getElementById('loginMode').value;
    const res = await fetch(`${BASE}/api/v1/users/login`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,password,mode})
    });
    const data = await res.json();
    if (data.access_token) {
        localStorage.setItem('dokets_token', data.access_token);
        token = data.access_token;
        currentMode = mode;
        userData = data.user;
        updateUI();
        renderDashboard();
    } else { showToast(data.detail || 'Login failed', 'error'); }
}

async function doRegister() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showToast('Fill all fields', 'error'); return; }
    const res = await fetch(`${BASE}/api/v1/users/register`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,password,phone_number:'+919100014859',full_name:email.split('@')[0]})
    });
    const data = await res.json();
    if (data.success) { showToast('Registered! Now login.'); doLogin(); }
    else { showToast(data.detail || 'Registration failed', 'error'); }
}

function updateUI() {
    if (!userData) return;
    document.getElementById('userName').textContent = userData.full_name || 'User';
    document.getElementById('userEmail').textContent = userData.email || '';
    document.getElementById('userAvatar').textContent = (userData.full_name || 'U')[0].toUpperCase();
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === currentMode));
    const badge = document.getElementById('modeBadge');
    badge.textContent = currentMode === 'customer' ? 'CUSTOMER' : 'PROVIDER';
    badge.className = `mode-badge badge-${currentMode}`;
}

async function switchMode(mode) {
    if (mode === currentMode) return;
    const res = await fetch(`${BASE}/api/v1/users/switch-mode`, {
        method:'PUT', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
        body:JSON.stringify({mode})
    });
    const data = await res.json();
    if (data.success) {
        token = data.access_token;
        localStorage.setItem('dokets_token', token);
        currentMode = mode;
        updateUI();
        renderDashboard();
    }
}

function logout() { localStorage.removeItem('dokets_token'); token = null; userData = null; showLoginModal(); }

// ==================== DASHBOARD RENDER ====================
function renderDashboard() {
    const main = document.getElementById('mainContent');
    const stats = currentMode === 'customer' ? [
        {icon:'📋',value:userData.total_contracts||0,label:'Contracts'},
        {icon:'✅',value:userData.completed_as_customer||0,label:'Completed'},
        {icon:'💰',value:`₹${userData.total_spent||0}`,label:'Spent'},
        {icon:'⭐',value:userData.vouch_score||100,label:'Vouch Score'}
    ] : [
        {icon:'📋',value:userData.total_contracts||0,label:'Jobs'},
        {icon:'✅',value:userData.completed_as_provider||0,label:'Completed'},
        {icon:'💵',value:`₹${userData.total_earned||0}`,label:'Earned'},
        {icon:'⭐',value:userData.vouch_score||100,label:'Vouch Score'}
    ];

    main.innerHTML = `
        <div class="tabs">
            <button class="tab ${activeTab==='dashboard'?'active':''}" onclick="activeTab='dashboard';renderDashboard()">🏠 Dashboard</button>
            <button class="tab ${activeTab==='contracts'?'active':''}" onclick="activeTab='contracts';renderContractsTab()">📄 Contracts <span class="badge-count" id="contractCount">-</span></button>
            <button class="tab ${activeTab==='ai'?'active':''}" onclick="activeTab='ai';renderAITab()">🤖 AI Tools</button>
            <button class="tab ${activeTab==='advanced'?'active':''}" onclick="activeTab='advanced';renderAdvancedTab()">⚡ Advanced</button>
            <button class="tab ${activeTab==='providers'?'active':''}" onclick="activeTab='providers';renderProvidersTab()">🔍 Discover</button>
        </div>

        <div class="stats-row animate-in">${stats.map(s=>`
            <div class="stat-card"><div class="stat-icon">${s.icon}</div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>
        `).join('')}</div>

        <div class="cards-grid animate-in">
            ${currentMode==='customer' ? `
            <div class="feature-card" onclick="openCreateContract()">
                <div class="card-badge badge-new">MANUAL</div>
                <div class="card-icon">📝</div><div class="card-title">Create Contract</div><div class="card-desc">Fill form, set milestones, secure payment</div>
            </div>
            <div class="feature-card ai-card" onclick="openAIContract()">
                <div class="card-badge badge-ai">AI</div>
                <div class="card-icon">🤖</div><div class="card-title">AI Smart Contract</div><div class="card-desc">Describe work naturally. AI builds it.</div>
            </div>
            ` : `
            <div class="feature-card" onclick="activeTab='contracts';renderContractsTab()">
                <div class="card-badge badge-new">JOBS</div>
                <div class="card-icon">📋</div><div class="card-title">Available Jobs</div><div class="card-desc">Accept contracts waiting for you</div>
            </div>
            <div class="feature-card" onclick="openPayoutRequest()">
                <div class="card-badge badge-premium">EARN</div>
                <div class="card-icon">💵</div><div class="card-title">Request Payout</div><div class="card-desc">Withdraw earnings via UPI/Bank</div>
            </div>
            `}
            <div class="feature-card ai-card" onclick="openAIVerify()">
                <div class="card-badge badge-ai">AI</div><div class="card-icon">🔍</div><div class="card-title">AI Work Verification</div><div class="card-desc">AI analyzes proof & auto-approves</div>
            </div>
            <div class="feature-card" onclick="openVideoCall()">
                <div class="card-badge badge-new">LIVE</div><div class="card-icon">📹</div><div class="card-title">Video Call</div><div class="card-desc">Secure Jitsi call with party</div>
            </div>
            <div class="feature-card" onclick="openDisputeMediation()">
                <div class="card-badge badge-premium">AI</div><div class="card-icon">⚖️</div><div class="card-title">AI Dispute Mediation</div><div class="card-desc">AI resolves conflicts fairly</div>
            </div>
            <div class="feature-card" onclick="openRecurringContract()">

async function renderContractsTab() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `<div class="animate-in"><h2 style="margin-bottom:1rem">📄 ${currentMode==='customer'?'My Contracts':'My Jobs'}</h2><div class="contract-list" id="contractList"><div class="empty-state"><div class="icon">⏳</div><p>Loading...</p></div></div></div>`;
    await loadContracts();
}

async function loadContracts() {
    const container = document.getElementById('contractList');
    if (!container) return;
    try {
        const res = await fetch(`${BASE}/api/v1/contracts/`, {headers:{'Authorization':'Bearer '+token}});
        const data = await res.json();
        const contracts = data.contracts || [];
        if (contracts.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No contracts yet</p></div>`; return;
        }
        container.innerHTML = contracts.map(c => {
            const isPendingAccept = currentMode === 'provider' && c.status === 'draft';
            return `
            <div class="contract-item" onclick="viewContract('${c.id}')">
                <div class="contract-left">
                    <div class="contract-icon" style="background:${c.status==='completed'?'#1a3a2a':c.status==='active'?'#1a2a3a':'#2a2a1a'}">${c.status==='completed'?'✅':c.status==='active'?'🔧':'📝'}</div>
                    <div class="contract-info"><h4>${c.title||'Untitled'}</h4><span>${c.id} · ${c.milestones?.length||0} milestones</span></div>
                </div>
                <div class="contract-right">
                    <div class="contract-amount">${c.currency||'INR'} ${c.total_amount||0}</div>
                    <span class="status-badge status-${c.status||'draft'}">${c.status||'draft'}</span>
                    ${isPendingAccept ? `<div style="margin-top:0.3rem"><button class="btn btn-success btn-sm" onclick="event.stopPropagation();acceptContract('${c.id}')">Accept</button><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();rejectContract('${c.id}')">Reject</button></div>` : ''}
                </div>
            </div>`;
        }).join('');
    } catch(e) { console.error(e); }
}

async function createContract() {

    const res=await fetch(`${BASE}/api/v1/contracts/`,{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({title,description:desc,provider_phone:phone,total_amount:amount,currency:'INR',milestones})});

async function acceptContract(cid) {

// ==================== CHATBOT ====================
function toggleChatbot() { document.getElementById('chatbotPanel').classList.toggle('open'); }
async function sendChat() {
    const input=document.getElementById('chatInput'), msg=input.value.trim();
    if(!msg)return;
    const msgs=document.getElementById('chatMessages');
    msgs.innerHTML+=`<div class="chat-msg user">${msg}</div>`;
    input.value='';
    try {
        const res=await fetch(`${BASE}/api/v1/chatbot/ask`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:msg})});
        const data=await res.json();
        msgs.innerHTML+=`<div class="chat-msg bot">${data.response||data.answer||'I can help with contracts, verification, and more!'}</div>`;
    } catch(e) { msgs.innerHTML+=`<div class="chat-msg bot">Sorry, I'm having trouble. Try again!</div>`; }
    msgs.scrollTop=msgs.scrollHeight;
}

// ==================== TOAST ====================
function showToast(msg, type='success') {
    const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}
