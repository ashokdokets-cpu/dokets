<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokets VouchAI - Dashboard</title>
    <style>
        :root {
            --bg: #0F172A;
            --card: #1E293B;
            --border: #334155;
            --text: #F1F5F9;
            --muted: #94A3B8;
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --customer: #3B82F6;
            --provider: #8B5CF6;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ========== HEADER ========== */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818CF8, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon { font-size: 1.8rem; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--provider));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .user-name {
            font-weight: 600;
        }

        .user-email {
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* ========== MODE SWITCHER ========== */
        .mode-switcher {
            display: flex;
            background: var(--bg);
            border-radius: 50px;
            padding: 4px;
            border: 1px solid var(--border);
            gap: 4px;
        }

        .mode-btn {
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: transparent;
            color: var(--muted);
            position: relative;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 12px rgba(99,102,241,0.4);
        }

        .mode-btn:hover:not(.active) {
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        .mode-indicator {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mode-customer { background: rgba(59,130,246,0.2); color: #60A5FA; }
        .mode-provider { background: rgba(139,92,246,0.2); color: #A78BFA; }

        /* ========== MAIN LAYOUT ========== */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ========== STATS ROW ========== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.85rem;
        }

        /* ========== ACTION CARDS ========== */
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .action-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .action-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .action-card.customer-card:hover {
            border-color: var(--customer);
            box-shadow: 0 4px 24px rgba(59,130,246,0.2);
        }

        .action-card.provider-card:hover {
            border-color: var(--provider);
            box-shadow: 0 4px 24px rgba(139,92,246,0.2);
        }

        .action-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .action-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .action-desc {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .action-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 0.7rem;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-weight: 700;
        }

        .badge-customer { background: rgba(59,130,246,0.2); color: #60A5FA; }
        .badge-provider { background: rgba(139,92,246,0.2); color: #A78BFA; }

        /* ========== CONTRACTS TABLE ========== */
        .contracts-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .contract-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .contract-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .contract-item:hover {
            border-color: var(--border);
            background: #1a2332;
        }

        .contract-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .contract-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .contract-info h4 {
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .contract-info span {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .contract-right {
            text-align: right;
        }

        .contract-amount {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-draft { background: rgba(148,163,184,0.2); color: #94A3B8; }
        .status-active { background: rgba(16,185,129,0.2); color: #34D399; }
        .status-completed { background: rgba(59,130,246,0.2); color: #60A5FA; }
        .status-disputed { background: rgba(239,68,68,0.2); color: #F87171; }

        /* ========== MODAL ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            width: 90%;
            max-width: 550px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal h3 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn-accept {
            background: var(--success);
            color: white;
            flex: 1;
        }

        .btn-reject {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .header-inner { flex-wrap: wrap; gap: 1rem; }
            .action-cards { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .contract-item { flex-direction: column; text-align: center; gap: 0.5rem; }
        }

        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr; }
            .mode-switcher { width: 100%; }
            .mode-btn { flex: 1; text-align: center; }
        }

        /* ========== ANIMATIONS ========== */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-in {
            animation: slideUp 0.4s ease forwards;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--success);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .toast.error { background: var(--danger); }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-inner">
        <div class="logo">
            <span class="logo-icon">🛡️</span> Dokets VouchAI
        </div>

        <div class="mode-switcher" id="modeSwitcher">
            <button class="mode-btn active" data-mode="customer" onclick="switchMode('customer')">
                🏠 I Need a Service
            </button>
            <button class="mode-btn" data-mode="provider" onclick="switchMode('provider')">
                🔧 I Provide a Service
            </button>
        </div>

        <div class="user-info">
            <div style="text-align:right">
                <div class="user-name" id="userName">User</div>
                <div class="user-email" id="userEmail">email</div>
            </div>
            <div class="user-avatar" id="userAvatar">U</div>
            <span class="mode-indicator mode-customer" id="modeBadge">CUSTOMER</span>
        </div>
    </div>
</header>

<!-- MAIN CONTENT -->
<main class="main" id="mainContent">
    <!-- Dynamic content loaded here -->
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
</div>

<script>
// ========== GLOBAL STATE ==========
const BASE = 'https://dokets.com';
let token = localStorage.getItem('dokets_token');
let currentMode = 'customer';
let userData = null;

// ========== INIT ==========
async function init() {
    if (!token) {
        window.location.href = '/';
        return;
    }
    
    try {
        const res = await fetch(`${BASE}/api/v1/users/me`, {
            headers: {'Authorization': 'Bearer ' + token}
        });
        
        if (!res.ok) {
            localStorage.removeItem('dokets_token');
            window.location.href = '/';
            return;
        }
        
        userData = await res.json();
        currentMode = userData.current_mode || 'customer';
        
        updateUI();
        loadDashboard();
        loadContracts();
    } catch (e) {
        console.error('Init error:', e);
    }
}

// ========== UPDATE UI ==========
function updateUI() {
    document.getElementById('userName').textContent = userData.full_name;
    document.getElementById('userEmail').textContent = userData.email;
    document.getElementById('userAvatar').textContent = userData.full_name[0].toUpperCase();
    
    // Update mode switcher
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === currentMode);
    });
    
    // Update mode badge
    const badge = document.getElementById('modeBadge');
    badge.textContent = currentMode === 'customer' ? 'CUSTOMER' : 'PROVIDER';
    badge.className = `mode-indicator mode-${currentMode}`;
}

// ========== SWITCH MODE ==========
async function switchMode(mode) {
    if (mode === currentMode) return;
    
    try {
        const res = await fetch(`${BASE}/api/v1/users/switch-mode`, {
            method: 'PUT',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({mode})
        });
        
        const data = await res.json();
        if (data.success) {
            token = data.access_token;
            localStorage.setItem('dokets_token', token);
            currentMode = mode;
            updateUI();
            loadDashboard();
            loadContracts();
        }
    } catch (e) {
        showToast('Failed to switch mode', 'error');
    }
}

// ========== LOAD DASHBOARD ==========
async function loadDashboard() {
    const main = document.getElementById('mainContent');
    
    const stats = currentMode === 'customer' ? [
        {icon: '📋', value: userData.total_contracts || 0, label: 'Total Contracts'},
        {icon: '✅', value: userData.completed_as_customer || 0, label: 'Completed Deals'},
        {icon: '💰', value: `₹${userData.total_spent || 0}`, label: 'Total Spent'},
        {icon: '⭐', value: userData.vouch_score || 100, label: 'Vouch Score'}
    ] : [
        {icon: '📋', value: userData.total_contracts || 0, label: 'Total Jobs'},
        {icon: '✅', value: userData.completed_as_provider || 0, label: 'Completed Jobs'},
        {icon: '💵', value: `₹${userData.total_earned || 0}`, label: 'Total Earned'},
        {icon: '⭐', value: userData.vouch_score || 100, label: 'Vouch Score'}
    ];
    
    main.innerHTML = `
        <!-- Stats -->
        <div class="stats-row animate-in">
            ${stats.map(s => `
                <div class="stat-card">
                    <div class="stat-icon">${s.icon}</div>
                    <div class="stat-value">${s.value}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            `).join('')}
        </div>
        
        <!-- Actions -->
        <h2 class="section-title">⚡ Quick Actions</h2>
        <div class="action-cards animate-in">
            ${currentMode === 'customer' ? `
                <div class="action-card customer-card" onclick="openCreateContract()">
                    <span class="action-badge badge-customer">CUSTOMER</span>
                    <div class="action-icon">📝</div>
                    <div class="action-title">Create New Contract</div>
                    <div class="action-desc">Describe your work, set milestones, and secure payment in escrow</div>
                </div>
                <div class="action-card" onclick="openFindProviders()">
                    <span class="action-badge badge-customer">DISCOVER</span>
                    <div class="action-icon">🔍</div>
                    <div class="action-title">Find Service Providers</div>
                    <div class="action-desc">Browse top-rated providers by service, location, and vouch score</div>
                </div>
            ` : `
                <div class="action-card provider-card" onclick="loadContracts()">
                    <span class="action-badge badge-provider">PROVIDER</span>
                    <div class="action-icon">📋</div>
                    <div class="action-title">Available Jobs</div>
                    <div class="action-desc">View and accept contracts waiting for your service</div>
                </div>
                <div class="action-card" onclick="openMyEarnings()">
                    <span class="action-badge badge-provider">EARNINGS</span>
                    <div class="action-icon">💵</div>
                    <div class="action-title">My Earnings</div>
                    <div class="action-desc">Track your completed work and total earnings</div>
                </div>
            `}
            <div class="action-card" onclick="window.open('/contract-view/demo','_blank')">
                <div class="action-icon">🔄</div>
                <div class="action-title">Switch to ${currentMode === 'customer' ? 'Provider' : 'Customer'} Mode</div>
                <div class="action-desc">You can be both! Switch modes to ${currentMode === 'customer' ? 'offer services' : 'hire services'}</div>
            </div>
        </div>
        
        <!-- Contracts -->
        <div class="contracts-section animate-in" id="contractsSection">
            <h2 class="section-title">📄 ${currentMode === 'customer' ? 'My Contracts' : 'My Jobs'}</h2>
            <div class="contract-list" id="contractList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>Loading contracts...</p>
                </div>
            </div>
        </div>
    `;
}

// ========== LOAD CONTRACTS ==========
async function loadContracts() {
    const container = document.getElementById('contractList');
    if (!container) return;
    
    try {
        const res = await fetch(`${BASE}/api/v1/contracts/`, {
            headers: {'Authorization': 'Bearer ' + token}
        });
        const data = await res.json();
        const contracts = data.contracts || [];
        
        if (contracts.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>No contracts yet</p>
                    <p style="font-size:0.85rem;margin-top:0.5rem">${currentMode === 'customer' ? 'Create your first contract!' : 'Waiting for job offers...'}</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = contracts.map(c => {
            const isProvider = currentMode === 'provider' && c.status === 'draft';
            const statusClass = `status-${c.status || 'draft'}`;
            const icon = c.status === 'completed' ? '✅' : c.status === 'active' ? '🔧' : '📝';
            const bgColor = c.status === 'completed' ? '#1a3a2a' : c.status === 'active' ? '#1a2a3a' : '#2a2a1a';
            
            return `
                <div class="contract-item" onclick="viewContract('${c.id}')" style="cursor:pointer">
                    <div class="contract-left">
                        <div class="contract-icon" style="background:${bgColor}">${icon}</div>
                        <div class="contract-info">
                            <h4>${c.title || 'Untitled'}</h4>
                            <span>${c.id} · ${c.milestones?.length || 0} milestones</span>
                        </div>
                    </div>
                    <div class="contract-right">
                        <div class="contract-amount">${c.currency || 'INR'} ${c.total_amount || 0}</div>
                        <span class="status-badge ${statusClass}">${c.status || 'draft'}</span>
                        ${isProvider ? `
                            <div style="margin-top:0.5rem">
                                <button class="btn btn-accept" onclick="event.stopPropagation();acceptContract('${c.id}')" style="padding:0.4rem 1rem;font-size:0.85rem">Accept</button>
                                <button class="btn btn-reject" onclick="event.stopPropagation();rejectContract('${c.id}')" style="padding:0.4rem 1rem;font-size:0.85rem">Reject</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join('');
    } catch (e) {
        console.error('Load contracts error:', e);
    }
}

// ========== CREATE CONTRACT MODAL ==========
function openCreateContract() {
    const modal = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    
    content.innerHTML = `
        <h3>📝 Create New Contract</h3>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="ctTitle" placeholder="e.g., House Painting - 3 Rooms">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="ctDesc" rows="3" placeholder="Describe the work needed..."></textarea>
        </div>
        <div class="form-group">
            <label>Provider Phone Number</label>
            <input type="text" id="ctPhone" placeholder="+919876543210">
        </div>
        <div class="form-group">
            <label>Total Amount (₹)</label>
            <input type="number" id="ctAmount" placeholder="15000">
        </div>
        <div class="form-group">
            <label>Currency</label>
            <select id="ctCurrency">
                <option value="INR">₹ INR</option>
                <option value="USD">$ USD</option>
                <option value="EUR">€ EUR</option>
                <option value="GBP">£ GBP</option>
            </select>
        </div>
        <div class="form-group">
            <label>Milestones (comma-separated: "Title:Amount, Title:Amount")</label>
            <input type="text" id="ctMilestones" placeholder="Prep:3000, Paint:8000, Final:4000">
        </div>
        <button class="btn btn-primary" onclick="createContract()">🚀 Create & Secure with Escrow</button>
        <button class="btn btn-outline" style="margin-top:0.5rem;width:100%" onclick="closeModal()">Cancel</button>
    `;
    
    modal.classList.add('show');
}

async function createContract() {
    const title = document.getElementById('ctTitle').value;
    const desc = document.getElementById('ctDesc').value;
    const phone = document.getElementById('ctPhone').value;
    const amount = parseFloat(document.getElementById('ctAmount').value);
    const currency = document.getElementById('ctCurrency').value;
    const milestonesStr = document.getElementById('ctMilestones').value;
    
    if (!title || !phone || !amount) {
        showToast('Please fill all required fields', 'error');
        return;
    }
    
    // Parse milestones
    const milestones = milestonesStr.split(',').map((m, i) => {
        const parts = m.trim().split(':');
        return {
            id: `MS-${i+1}`,
            title: parts[0]?.trim() || `Milestone ${i+1}`,
            amount: parseFloat(parts[1]) || 0,
            deadline: new Date(Date.now() + (i+1)*3*86400000).toISOString().split('T')[0]
        };
    }).filter(m => m.amount > 0);
    
    if (milestones.length === 0) {
        milestones.push({
            id: 'MS-1',
            title: 'Complete Work',
            amount: amount,
            deadline: new Date(Date.now() + 7*86400000).toISOString().split('T')[0]
        });
    }
    
    try {
        const res = await fetch(`${BASE}/api/v1/contracts/`, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title, description: desc, provider_phone: phone,
                total_amount: amount, currency, milestones
            })
        });
        
        const data = await res.json();
        if (data.success) {
            closeModal();
            showToast('✅ Contract created! Provider notified via WhatsApp');
            loadContracts();
        } else {
            showToast('Failed to create contract', 'error');
        }
    } catch (e) {
        showToast('Error creating contract', 'error');
    }
}

// ========== ACCEPT / REJECT CONTRACT ==========
async function acceptContract(contractId) {
    try {
        const res = await fetch(`${BASE}/api/v1/contracts/${contractId}/accept`, {
            method: 'PUT',
            headers: {'Authorization': 'Bearer ' + token}
        });
        const data = await res.json();
        if (data.success) {
            showToast('✅ Contract accepted! Work can begin.');
            loadContracts();
        } else {
            showToast(data.detail || 'Failed to accept', 'error');
        }
    } catch (e) {
        showToast('Error accepting contract', 'error');
    }
}

async function rejectContract(contractId) {
    try {
        const res = await fetch(`${BASE}/api/v1/contracts/${contractId}/reject`, {
            method: 'PUT',
            headers: {'Authorization': 'Bearer ' + token}
        });
        const data = await res.json();
        if (data.success) {
            showToast('Contract rejected');
            loadContracts();
        }
    } catch (e) {
        showToast('Error rejecting contract', 'error');
    }
}

// ========== VIEW CONTRACT ==========
function viewContract(contractId) {
    window.open(`/contract-view/${contractId}`, '_blank');
}

// ========== MODAL ==========
function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ========== TOAST ==========
function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ========== START ==========
init();
</script>
