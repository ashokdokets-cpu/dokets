<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Dokets VouchAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#080c14;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#0f1419;border:1px solid #1c2330;border-radius:12px;padding:2.5rem;width:95%;max-width:420px;text-align:center}
        h2{font-size:1.5rem;margin-bottom:0.5rem;font-weight:800}
        .ref-badge{display:inline-block;background:rgba(34,197,94,0.1);color:#22c55e;padding:0.3rem 0.8rem;border-radius:50px;font-size:0.8rem;margin-bottom:1.5rem}
        .form-group{margin-bottom:1rem;text-align:left}
        .form-group label{display:block;margin-bottom:0.3rem;font-size:0.8rem;color:#64748b;font-weight:600}
        .form-group input{width:100%;padding:0.6rem 0.8rem;background:#080c14;border:1px solid #1c2330;border-radius:8px;color:#e2e8f0;font-size:0.85rem;font-family:inherit}
        .form-group input:focus{outline:none;border-color:#6366f1}
        .btn{width:100%;padding:0.7rem;border-radius:8px;border:none;font-weight:600;font-size:0.9rem;cursor:pointer;font-family:inherit;transition:0.2s;background:#6366f1;color:#fff;margin-top:0.5rem}
        .btn:hover{background:#5558e6}
        .toast{position:fixed;top:1rem;right:1rem;background:#0f1419;color:#e2e8f0;padding:0.8rem 1.2rem;border-radius:8px;font-weight:600;font-size:0.85rem;z-index:2000;border:1px solid #1c2330;border-left:3px solid #22c55e}
        .toast.error{border-left-color:#ef4444}
        .login-link{color:#6366f1;font-size:0.8rem;text-decoration:none;margin-top:1rem;display:block}
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size:2rem;margin-bottom:0.5rem">🛡️</div>
        <h2>Join Dokets VouchAI</h2>
        <p style="color:#64748b;margin-bottom:1rem;font-size:0.85rem">Trust in Every Deal</p>
        <div class="ref-badge" id="refBadge">Referred by: {{REF_CODE}}</div>
        <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="your@email.com"></div>
        <div class="form-group"><label>Phone Number</label><input type="text" id="signupPhone" placeholder="+919100014859"></div>
        <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Your Name"></div>
        <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="Min 8 characters"></div>
        <button class="btn" onclick="registerWithRef()">Create Account</button>
        <a href="/dashboard" class="login-link">Already have an account? Sign in</a>
        <p id="signupMsg" style="margin-top:0.75rem;font-size:0.8rem"></p>
    </div>

<script>
const BASE = 'https://dokets.com';
const refCode = '{{REF_CODE}}';

if (!refCode) {
    document.getElementById('refBadge').style.display = 'none';
}

async function registerWithRef() {
    const email = document.getElementById('signupEmail').value;
    const phone = document.getElementById('signupPhone').value;
    const name = document.getElementById('signupName').value;
    const password = document.getElementById('signupPassword').value;
    
    if (!email || !password) {
        document.getElementById('signupMsg').innerHTML = '<span style="color:#ef4444">Email and password required</span>';
        return;
    }
    
    const r = await fetch(BASE+'/api/v1/users/register', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email, password, phone_number:phone||'+919100014859', full_name:name||email.split('@')[0]})
    });
    const d = await r.json();
    
    if (d.success) {
        document.getElementById('signupMsg').innerHTML = '<span style="color:#22c55e">Account created! Redirecting...</span>';
        
        // Track referral if code exists
        if (refCode) {
            fetch(BASE+'/api/v1/referrals/track', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({referral_code: refCode, new_user: email})
            }).catch(()=>{});
        }
        
        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
    } else {
        document.getElementById('signupMsg').innerHTML = '<span style="color:#ef4444">'+ (d.detail||'Registration failed') +'</span>';
    }
}
</script>
</body>
</html>
